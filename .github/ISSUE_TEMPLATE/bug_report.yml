name: Bug Report
description: Report a bug in BoardRipper
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of BoardRipper is affected?
      options:
        - Board Renderer (PixiJS)
        - PDF Viewer
        - File Parser (specify format below)
        - Library / File Scanner
        - UI / Panels
        - Backend / Docker
        - Desktop App (Electron)
    validations:
      required: true
  - type: input
    id: format
    attributes:
      label: File Format (if applicable)
      description: "BVR1, BVR3, BRD, BDV, FZ, CAD, XZZ, TVW, Allegro BRD"
      placeholder: "e.g. BRD"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker (NAS)
        - Desktop (macOS)
        - Desktop (Windows)
        - Dev server (localhost)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug Panel output
      description: "Open Debug Panel → copy relevant log scopes (parser.*, render.*, pdf.*, etc.)"
      render: shell
