name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/backend/go.sum

      # Lint + typecheck + smoke tests
      - run: cd src/frontend && npm ci
      - run: cd src/frontend && npx eslint . --max-warnings 90
      - run: cd src/frontend && npx tsc -b --noEmit
      - run: cd src/frontend && npx playwright install --with-deps chromium
      - run: cd src/frontend && npx playwright test ci-smoke.spec.ts
      - run: cd src/backend && go test ./... -v -count=1

      # Docker build + smoke
      - run: docker build --build-arg APP_VERSION=${{ github.ref_name }} -t boardripper:${{ github.ref_name }} .
      - run: |
          docker run -d --name br-release -p 8080:8080 boardripper:${{ github.ref_name }}
          sleep 3
          curl -f http://localhost:8080/
          docker stop br-release

  # Standalone Go binary bundles (linux/macos/windows) and Electron desktop
  # apps are intentionally paused — Docker is the only supported deployment
  # target right now. Re-enable by restoring build-binaries / build-desktop-*
  # jobs and adding them back to create-release.needs.

  # Build and push multi-arch Docker image
  build-docker:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg APP_VERSION=${{ github.ref_name }} \
            --tag boardripper:${{ github.ref_name }} \
            --output type=docker,dest=boardripper-docker.tar \
            .
          gzip boardripper-docker.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: boardripper-docker.tar.gz

  # Create GitHub release with all artifacts
  create-release:
    needs: [build-docker]
    runs-on: ubuntu-latest
    steps:
      # Full history + tags needed so the changelog step can diff against
      # the previous tag.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: artifacts/

      - name: Rename Docker image
        run: mv artifacts/boardripper-docker.tar.gz artifacts/boardripper-docker-${{ github.ref_name }}.tar.gz

      # Build real changelog from commits since the previous tag.
      # Skip "release:" meta-commits (they don't describe user-visible changes).
      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            echo "## BoardRipper ${TAG}"
            echo
            if [ -n "${PREV}" ]; then
              echo "### Changes since ${PREV}"
              echo
              git log --no-merges --pretty=format:'- %s' "${PREV}..${TAG}" \
                | grep -Ev '^- release:|^- chore\(release\):' \
                || echo "- (no non-release commits)"
              echo
            else
              echo "### Initial release"
              echo
            fi
            echo
            echo "### Downloads"
            echo "- \`boardripper-docker-${TAG}.tar.gz\` — Docker image (only supported deployment target)"
          } > RELEASE_NOTES.md
          echo "---- generated release notes ----"
          cat RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/boardripper-docker-*.tar.gz
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
