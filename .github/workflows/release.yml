name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/backend/go.sum

      # Lint + typecheck + smoke tests
      - run: cd src/frontend && npm ci
      - run: cd src/frontend && npx eslint . --max-warnings 50
      - run: cd src/frontend && npx tsc -b --noEmit
      - run: cd src/frontend && npx playwright install --with-deps chromium
      - run: cd src/frontend && npx playwright test ci-smoke.spec.ts
      - run: cd src/backend && go test ./... -v -count=1

      # Docker build + smoke
      - run: docker build --build-arg APP_VERSION=${{ github.ref_name }} -t boardripper:${{ github.ref_name }} .
      - run: |
          docker run -d --name br-release -p 8080:8080 boardripper:${{ github.ref_name }}
          sleep 3
          curl -f http://localhost:8080/
          docker stop br-release

  # Build standalone binaries for Windows, macOS, macOS ARM, and Linux
  build-binaries:
    needs: validate
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/backend/go.sum

      # Build frontend once
      - name: Build frontend
        run: cd src/frontend && npm ci && npm run build

      - name: Verify frontend build
        run: |
          test -f src/frontend/dist/index.html || { echo "FATAL: frontend dist missing"; exit 1; }
          echo "Frontend dist OK ($(find src/frontend/dist -type f | wc -l) files)"

      # Build Go server for all platforms
      - name: Build Go binaries
        working-directory: src/backend
        run: |
          set -euxo pipefail
          LDFLAGS="-s -w -X boardripper/updater.Version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o "$GITHUB_WORKSPACE/boardripper-linux-amd64" .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o "$GITHUB_WORKSPACE/boardripper-windows-amd64.exe" .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o "$GITHUB_WORKSPACE/boardripper-macos-amd64" .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o "$GITHUB_WORKSPACE/boardripper-macos-arm64" .

      - name: Verify Go binaries
        run: |
          set -euo pipefail
          for bin in boardripper-linux-amd64 boardripper-windows-amd64.exe boardripper-macos-amd64 boardripper-macos-arm64; do
            test -f "$bin" || { echo "FATAL: $bin not found"; exit 1; }
            SIZE=$(stat --format=%s "$bin")
            if [ "$SIZE" -lt 1000000 ]; then
              echo "FATAL: $bin too small (${SIZE} bytes)"; exit 1
            fi
            echo "OK: $bin ($(numfmt --to=iec $SIZE))"
          done

      # Package each platform: binary + frontend dist
      - name: Package releases
        run: |
          set -euxo pipefail
          for PLATFORM in linux-amd64 macos-amd64 macos-arm64; do
            mkdir -p "pkg-${PLATFORM}/static"
            cp "boardripper-${PLATFORM}" "pkg-${PLATFORM}/boardripper"
            chmod +x "pkg-${PLATFORM}/boardripper"
            cp -r src/frontend/dist/* "pkg-${PLATFORM}/static/"
            tar -czf "boardripper-${PLATFORM}-${VERSION}.tar.gz" -C "pkg-${PLATFORM}" .
          done
          # Windows: zip instead of tar.gz
          mkdir -p pkg-windows-amd64/static
          cp boardripper-windows-amd64.exe pkg-windows-amd64/boardripper.exe
          cp -r src/frontend/dist/* pkg-windows-amd64/static/
          cd pkg-windows-amd64 && zip -r "../boardripper-windows-amd64-${VERSION}.zip" . && cd ..

      - name: Validate release contents
        run: |
          set -euo pipefail
          for file in boardripper-*-${VERSION}.tar.gz; do
            echo "=== $file ==="
            CONTENTS=$(tar -tzf "$file")
            echo "$CONTENTS" | grep -q '^\./boardripper$' || { echo "FATAL: binary missing from $file"; exit 1; }
            echo "$CONTENTS" | grep -q '^\./static/index.html$' || { echo "FATAL: static missing from $file"; exit 1; }
            echo "OK: binary + static present"
          done
          echo "=== boardripper-windows-amd64-${VERSION}.zip ==="
          CONTENTS=$(unzip -l "boardripper-windows-amd64-${VERSION}.zip")
          echo "$CONTENTS" | grep -q 'boardripper.exe' || { echo "FATAL: exe missing from zip"; exit 1; }
          echo "$CONTENTS" | grep -q 'static/index.html' || { echo "FATAL: static missing from zip"; exit 1; }
          echo "OK: exe + static present"

      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            boardripper-linux-amd64-*.tar.gz
            boardripper-macos-amd64-*.tar.gz
            boardripper-macos-arm64-*.tar.gz
            boardripper-windows-amd64-*.zip

  # Build standalone Electron desktop app for macOS (universal: arm64 + x64)
  build-desktop-mac:
    needs: validate
    runs-on: macos-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: cd src/frontend && npm ci

      - name: Install desktop deps
        run: cd desktop && npm ci

      - name: Build macOS universal Electron app
        run: cd desktop && node build-all.mjs --mac

      - name: Verify macOS build output
        run: |
          set -euo pipefail
          ZIP="desktop/out/BoardRipper-macOS-universal-${VERSION}.zip"
          test -f "$ZIP" || { echo "FATAL: $ZIP not found"; ls -la desktop/out/; exit 1; }
          SIZE=$(stat -f%z "$ZIP")
          if [ "$SIZE" -lt 50000000 ]; then
            echo "FATAL: $ZIP too small (${SIZE} bytes — Electron app should be 100MB+)"; exit 1
          fi
          echo "OK: $ZIP ($(du -h "$ZIP" | cut -f1))"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: desktop/out/BoardRipper-macOS-universal-*.zip

  # Build standalone Electron desktop app for Windows (x64) — cross-compiled from Linux
  build-desktop-win:
    needs: validate
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install zip (for cross-platform zipping)
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Install frontend deps
        run: cd src/frontend && npm ci

      - name: Install desktop deps
        run: cd desktop && npm ci

      - name: Build Windows x64 Electron app
        run: cd desktop && node build-all.mjs --win

      - name: Verify Windows build output
        run: |
          set -euo pipefail
          ZIP="desktop/out-win/BoardRipper-Windows-x64-${VERSION}.zip"
          test -f "$ZIP" || { echo "FATAL: $ZIP not found"; ls -la desktop/out-win/; exit 1; }
          SIZE=$(stat --format=%s "$ZIP")
          if [ "$SIZE" -lt 50000000 ]; then
            echo "FATAL: $ZIP too small (${SIZE} bytes — Electron app should be 100MB+)"; exit 1
          fi
          echo "OK: $ZIP ($(numfmt --to=iec $SIZE))"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: desktop/out-win/BoardRipper-Windows-x64-*.zip

  # Build and push multi-arch Docker image
  build-docker:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg APP_VERSION=${{ github.ref_name }} \
            --tag boardripper:${{ github.ref_name }} \
            --output type=docker,dest=boardripper-docker.tar \
            .
          gzip boardripper-docker.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: boardripper-docker.tar.gz

  # Create GitHub release with all artifacts
  create-release:
    needs: [build-binaries, build-desktop-mac, build-desktop-win, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: desktop-mac
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: desktop-win
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: artifacts/

      - name: Rename Docker image
        run: mv artifacts/boardripper-docker.tar.gz artifacts/boardripper-docker-${{ github.ref_name }}.tar.gz

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BoardRipper-macOS-universal-*.zip
            artifacts/BoardRipper-Windows-x64-*.zip
            artifacts/boardripper-linux-amd64-*.tar.gz
            artifacts/boardripper-macos-amd64-*.tar.gz
            artifacts/boardripper-macos-arm64-*.tar.gz
            artifacts/boardripper-windows-amd64-*.zip
            artifacts/boardripper-docker-*.tar.gz
          body: |
            ## BoardRipper ${{ github.ref_name }}

            ### Desktop apps (recommended)
            - **macOS**: `BoardRipper-macOS-universal-${{ github.ref_name }}.zip` — universal (Intel + Apple Silicon)
            - **Windows**: `BoardRipper-Windows-x64-${{ github.ref_name }}.zip` — x64

            ### Server deployment
            - **Docker**: `boardripper-docker-${{ github.ref_name }}.tar.gz`
            - **Standalone** (Go server + static files, requires manual setup): linux/macos/windows tarballs
          generate_release_notes: true
