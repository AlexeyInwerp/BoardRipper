name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Lint + typecheck + smoke tests
      - run: cd src/frontend && npm ci
      - run: cd src/frontend && npx eslint . --max-warnings 50
      - run: cd src/frontend && npx tsc -b --noEmit
      - run: cd src/frontend && npx playwright install --with-deps chromium
      - run: cd src/frontend && npx playwright test ci-smoke.spec.ts
      - run: cd src/backend && go test ./... -v -count=1

      # Docker build + smoke
      - run: docker build --build-arg APP_VERSION=${{ github.ref_name }} --build-arg GITHUB_TOKEN=${{ secrets.UPDATE_TOKEN }} -t boardripper:${{ github.ref_name }} .
      - run: |
          docker run -d --name br-release -p 8080:8080 boardripper:${{ github.ref_name }}
          sleep 3
          curl -f http://localhost:8080/
          docker stop br-release

  # Build standalone binaries for Windows, macOS, macOS ARM, and Linux
  build-binaries:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Build frontend once
      - run: cd src/frontend && npm ci && npm run build

      # Build Go server for all platforms (version injected, no update token for standalone)
      - name: Build Linux amd64
        run: |
          cd src/backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X boardripper/updater.Version=${{ github.ref_name }}" -o ../../boardripper-linux-amd64 .
      - name: Build Windows amd64
        run: |
          cd src/backend
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X boardripper/updater.Version=${{ github.ref_name }}" -o ../../boardripper-windows-amd64.exe .
      - name: Build macOS amd64 (Intel)
        run: |
          cd src/backend
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X boardripper/updater.Version=${{ github.ref_name }}" -o ../../boardripper-macos-amd64 .
      - name: Build macOS arm64 (Apple Silicon)
        run: |
          cd src/backend
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X boardripper/updater.Version=${{ github.ref_name }}" -o ../../boardripper-macos-arm64 .

      # Package each platform: binary + frontend dist
      - name: Package releases
        run: |
          VERSION=${{ github.ref_name }}
          for PLATFORM in linux-amd64 macos-amd64 macos-arm64; do
            mkdir -p "pkg-${PLATFORM}/static"
            cp "boardripper-${PLATFORM}" "pkg-${PLATFORM}/boardripper"
            chmod +x "pkg-${PLATFORM}/boardripper"
            cp -r src/frontend/dist/* "pkg-${PLATFORM}/static/"
            tar -czf "boardripper-${PLATFORM}-${VERSION}.tar.gz" -C "pkg-${PLATFORM}" .
          done
          # Windows: zip instead of tar.gz
          mkdir -p pkg-windows-amd64/static
          cp boardripper-windows-amd64.exe pkg-windows-amd64/boardripper.exe
          cp -r src/frontend/dist/* pkg-windows-amd64/static/
          cd pkg-windows-amd64 && zip -r "../boardripper-windows-amd64-${VERSION}.zip" . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            boardripper-linux-amd64-*.tar.gz
            boardripper-macos-amd64-*.tar.gz
            boardripper-macos-arm64-*.tar.gz
            boardripper-windows-amd64-*.zip

  # Build and push multi-arch Docker image
  build-docker:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg APP_VERSION=${{ github.ref_name }} \
            --build-arg GITHUB_TOKEN=${{ secrets.UPDATE_TOKEN }} \
            --tag boardripper:${{ github.ref_name }} \
            --output type=docker,dest=boardripper-docker.tar \
            .
          gzip boardripper-docker.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: boardripper-docker.tar.gz

  # Create GitHub release with all artifacts
  create-release:
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: artifacts/

      - name: Rename Docker image
        run: mv artifacts/boardripper-docker.tar.gz artifacts/boardripper-docker-${{ github.ref_name }}.tar.gz

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/boardripper-linux-amd64-*.tar.gz
            artifacts/boardripper-macos-amd64-*.tar.gz
            artifacts/boardripper-macos-arm64-*.tar.gz
            artifacts/boardripper-windows-amd64-*.zip
            artifacts/boardripper-docker-*.tar.gz
          body: |
            ## BoardRipper ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | **Windows** | `boardripper-windows-amd64-${{ github.ref_name }}.zip` | Standalone, no install needed |
            | **macOS Intel** | `boardripper-macos-amd64-${{ github.ref_name }}.tar.gz` | For Intel Macs |
            | **macOS Apple Silicon** | `boardripper-macos-arm64-${{ github.ref_name }}.tar.gz` | For M1/M2/M3/M4 Macs |
            | **Linux** | `boardripper-linux-amd64-${{ github.ref_name }}.tar.gz` | Standalone binary |
            | **Docker** | `boardripper-docker-${{ github.ref_name }}.tar.gz` | Multi-arch (amd64 + arm64) |

            ### Standalone Usage (Windows/macOS/Linux)

            ```bash
            # Extract
            tar -xzf boardripper-<platform>-${{ github.ref_name }}.tar.gz
            # (Windows: unzip boardripper-windows-amd64-${{ github.ref_name }}.zip)

            # Run — serves on http://localhost:8080
            STATIC_DIR=./static DATA_DIR=./data ./boardripper
            # Windows: set STATIC_DIR=static& set DATA_DIR=data& boardripper.exe
            ```

            ### Docker Setup (Recommended for NAS/Server)

            #### Quick Start
            ```bash
            # Load the image
            docker load < boardripper-docker-${{ github.ref_name }}.tar.gz

            # Run
            docker run -d \
              --name boardripper \
              -p 8081:8080 \
              -v /path/to/your/boards:/data \
              -v /path/to/your/library:/library \
              --restart unless-stopped \
              boardripper:${{ github.ref_name }}
            ```

            #### Step-by-Step Docker Compose Setup

            **1. Create a project directory:**
            ```bash
            mkdir boardripper && cd boardripper
            ```

            **2. Create `docker-compose.yml`:**
            ```yaml
            services:
              boardripper:
                image: boardripper:${{ github.ref_name }}
                ports:
                  - "8081:8080"        # Access at http://your-nas-ip:8081
                volumes:
                  - ./data:/data       # Uploaded board files persist here
                  - ./library:/library # Optional: mount your board file library
                restart: unless-stopped
                environment:
                  - PORT=8080
                deploy:
                  resources:
                    limits:
                      memory: 512M
            ```

            **3. Load the Docker image:**
            ```bash
            docker load < boardripper-docker-${{ github.ref_name }}.tar.gz
            ```

            **4. Start the service:**
            ```bash
            docker compose up -d
            ```

            **5. Open in browser:**
            ```
            http://localhost:8081
            # or http://your-nas-ip:8081
            ```

            #### Synology NAS (DSM 7.2+)
            1. Copy `boardripper-docker-${{ github.ref_name }}.tar.gz` to your NAS
            2. SSH in: `docker load < boardripper-docker-${{ github.ref_name }}.tar.gz`
            3. In Container Manager → Project → Create:
               - Paste the `docker-compose.yml` above
               - Set paths: `/volume1/docker/boardripper/data` and `/volume1/docker/boardripper/library`
            4. Click "Build" → access at `http://nas-ip:8081`

            #### Updating
            ```bash
            docker load < boardripper-docker-<new-version>.tar.gz
            docker compose down && docker compose up -d
            ```
          generate_release_notes: true
